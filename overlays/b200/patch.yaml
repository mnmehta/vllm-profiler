apiVersion: apps/v1
kind: Deployment
metadata:
  name: env-injector
  namespace: vllm-profiler
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: dell-b200-2.bmas-001.lab.rdu2.dc.redhat.com  # TODO: Set node hostname for b200 cluster
      containers:
        - name: webhook
          env:
            - name: TARGET_NAMESPACE
              value: "kserve-e2e-perf"
            - name: TARGET_LABELS
              value: "component=predictor"